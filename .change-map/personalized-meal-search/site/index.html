<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand"><span class="mark">◇</span><strong>Change Map</strong><i>/</i><span id="repo"></span></div>
        <div class="meta"><span id="branch"></span><i></i><span id="time"></span></div>
      </header>

      <section class="summary">
        <div>
          <div class="eyebrow"><span class="pulse"></span><b id="stage"></b><span id="confidence"></span></div>
          <h1 id="title"></h1>
          <p id="description"></p>
        </div>
        <div class="stats">
          <div><strong id="fileCount">0</strong><span>files</span></div>
          <div><strong id="symbolCount">0</strong><span>symbols</span></div>
          <div><strong id="assumptionCount">0</strong><span>assumptions</span></div>
        </div>
      </section>

      <main>
        <section class="canvas-column">
          <div class="toolbar">
            <div class="tabs" id="viewTabs"></div>
            <div class="legend">
              <span><i class="dot modified"></i>Modified</span>
              <span><i class="dot added"></i>Added</span>
              <span><i class="dash"></i>Inferred</span>
              <button id="fit">⌗ Fit</button>
            </div>
          </div>
          <div class="viewport" id="viewport">
            <div class="grid"></div>
            <div class="stage" id="graphStage">
              <svg id="edges" aria-hidden="true"></svg>
              <div id="nodes"></div>
            </div>
            <div class="zoom">
              <button id="zoomIn">+</button><span id="zoomLabel">100%</span><button id="zoomOut">−</button>
            </div>
            <div class="hint">Drag to pan · double-click a node to focus</div>
          </div>
        </section>

        <aside>
          <div class="aside-tabs">
            <button class="active" data-panel="details">Details</button>
            <button data-panel="impact">Impact <span id="impactCount">0</span></button>
          </div>
          <div class="panel active" id="detailsPanel">
            <div class="empty"><span>◎</span><strong>Select a node to inspect</strong><p>Explore source, relationships, and change details.</p></div>
            <div class="detail-content"></div>
          </div>
          <div class="panel" id="impactPanel"></div>
        </aside>
      </main>

      <div class="approval">
        <div><span class="approval-icon">◇</span><p><strong id="reviewTitle">Ready for your review</strong><small id="reviewSummary"></small></p></div>
        <div class="actions">
          <button class="ghost" id="cancel">Cancel</button>
          <button class="secondary" id="revise">Revise plan</button>
          <button class="primary" id="approve">Approve in Codex <kbd>⌘ ↵</kbd></button>
        </div>
      </div>

      <div class="toast" id="toast"><span>✓</span><p><strong></strong><small></small></p></div>
    </div>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
